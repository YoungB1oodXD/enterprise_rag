version: "3.8"

services:
  elasticsearch:
    build:
      context: .
      dockerfile: docker/Dockerfile.es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      retries: 10

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rag_enterprise_root
      MYSQL_DATABASE: rag_enterprise
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag_enterprise
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
    ports:
      - "6006:6006"
    depends_on:
      elasticsearch:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./config.yaml:/app/config.yaml
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  es_data:
  mysql_data:
  uploads:
